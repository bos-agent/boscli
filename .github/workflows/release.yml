name: Release to PyPI

on:
  push:
    branches:
      - main
    paths:
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  tag-and-publish:
    name: Tag and Publish release to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch all history to ensure rev-parse check works
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Check and create tag
        id: check-tag
        run: |
          VERSION=$(python -c "import re; print(re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()).group(1))")
          echo "Version in pyproject.toml: $VERSION"
          
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists. Skipping publication."
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v$VERSION does not exist. Tagging commit..."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git tag "v$VERSION"
            git push origin "v$VERSION"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Install uv
        if: steps.check-tag.outputs.should_publish == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build package
        if: steps.check-tag.outputs.should_publish == 'true'
        run: uv build

      - name: Publish package distribution to PyPI
        if: steps.check-tag.outputs.should_publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
