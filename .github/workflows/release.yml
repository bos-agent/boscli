name: Release to PyPI

on:
  push:
    branches:
      - main
    paths:
      - 'pyproject.toml'
  schedule:
    # Run daily at 00:00 UTC to check for updates
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-and-publish:
    name: Sync and Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch all history so tag existence check works
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run version sync script
        id: sync
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: uv run --with packaging .github/scripts/sync_version.py

      - name: Update lock file
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && steps.sync.outputs.updated == 'true'
        run: uv sync

      - name: Check and create tag
        id: check-tag
        run: |
          VERSION=$(python -c "import re; print(re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()).group(1))")
          echo "Version in pyproject.toml: $VERSION"
          
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists. Skipping publication."
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v$VERSION does not exist. Tagging and publishing."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            # Commit and push changes if we modified pyproject.toml/uv.lock in the sync step
            if [ "${{ steps.sync.outputs.updated }}" = "true" ]; then
              git add pyproject.toml uv.lock
              git commit -m "chore: sync with bos-ai v$VERSION"
              git push origin main
            fi
            
            git tag "v$VERSION"
            git push origin "v$VERSION"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Build package
        if: steps.check-tag.outputs.should_publish == 'true'
        run: uv build

      - name: Publish package distribution to PyPI
        if: steps.check-tag.outputs.should_publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
