name: Sync with bos-ai

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Check and sync version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run version sync script
        id: sync
        # Run with packaging dependency using uv
        run: uv run --with packaging .github/scripts/sync_version.py

      - name: Update lock file
        if: steps.sync.outputs.updated == 'true'
        run: uv sync

      - name: Commit and push changes
        if: steps.sync.outputs.updated == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock
          git commit -m "chore: sync with bos-ai v${{ steps.sync.outputs.new_version }}"
          git push origin main
          git tag v${{ steps.sync.outputs.new_version }}
          git push origin v${{ steps.sync.outputs.new_version }}
